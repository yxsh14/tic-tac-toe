version: "3"

services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: root
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      - postgres
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ../backend/nakama/build:/nakama/data/modules
    command:
      - /nakama/nakama
      - --name nakama1
      - --database.address root:localdb@postgres:5432/nakama
      - --logger.level DEBUG